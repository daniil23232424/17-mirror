<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L7 MIRROR // НАБЛЮДЕНИЕ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000000;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        @keyframes threat {
            0% { box-shadow: 0 0 10px #ff0000; border-color: #ff0000; }
            100% { box-shadow: 0 0 30px #ff0000; border-color: #ff4444; }
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            padding: 30px;
            border: 2px solid #ff0000;
            background: #0a0000;
            animation: threat 1s infinite alternate;
        }
        
        h1 {
            color: #ff0000;
            text-align: center;
            font-size: 1.3rem;
            margin-bottom: 20px;
        }
        
        .warning {
            background: rgba(255, 0, 0, 0.15);
            border-left: 4px solid #ff0000;
            padding: 15px;
            margin: 20px 0;
            color: #ff8888;
            font-weight: bold;
            text-align: center;
            font-size: 1.2rem;
        }
        
        .blink {
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .data-box {
            background: #000000;
            border: 1px solid #ff3333;
            padding: 20px;
            margin: 20px 0;
        }
        
        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #330000;
        }
        
        .data-label {
            color: #ff6666;
            font-weight: bold;
        }
        
        .data-value {
            color: #ffffff;
            font-family: monospace;
            text-align: right;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: #663333;
        }
        
        .return-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #ff6666;
            text-decoration: none;
            border: 1px solid #ff3333;
            padding: 10px;
        }
        
        .return-link:hover {
            background: #ff0000;
            color: #000;
        }
        
        .loading {
            color: #ffaa44;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠ L7 MIRROR NODE ⚠</h1>
        
        <div class="warning blink">
            🔴 СИСТЕМА СЛЕДИТ ЗА ТОБОЙ 🔴
        </div>
        
        <div class="data-box">
            <div class="data-row">
                <span class="data-label">[IP АДРЕС]</span>
                <span class="data-value" id="ip"><span class="loading">🔍 определение...</span></span>
            </div>
            <div class="data-row">
                <span class="data-label">[ГЕОЛОКАЦИЯ]</span>
                <span class="data-value" id="geo"><span class="loading">🔍 определение...</span></span>
            </div>
            <div class="data-row">
                <span class="data-label">[ПРОВАЙДЕР]</span>
                <span class="data-value" id="isp"><span class="loading">🔍 определение...</span></span>
            </div>
            <div class="data-row">
                <span class="data-label">[БРАУЗЕР]</span><span class="data-value" id="browser">---</span>
            </div>
            <div class="data-row">
                <span class="data-label">[ОС]</span>
                <span class="data-value" id="os">---</span>
            </div>
            <div class="data-row">
                <span class="data-label">[ЭКРАН]</span>
                <span class="data-value" id="screen">---</span>
            </div>
        </div>
        
        <div class="footer">
            > эта страница показывает, что видит система<br>
            > данные видны только тебе<br>
            > но система запоминает
        </div>
        
        <a href="javascript:history.back()" class="return-link">← ВЕРНУТЬСЯ</a>
    </div>
    
    <script>
        // Функция для получения IP
        async function getIP() {
            try {
                // Пробуем первый API
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (e) {
                console.log('Первый API не работает');
                return null;
            }
        }
        
        // Функция для получения геоданных
        async function getGeo(ip) {
            try {
                // Пробуем ip-api.com (работает в РФ)
                const response = await fetch(http://ip-api.com/json/${ip}?fields=status,country,city,isp,lat,lon,query);
                const data = await response.json();
                if (data.status === 'success') {
                    return data;
                }
            } catch (e) {
                console.log('ip-api.com не работает');
            }
            return null;
        }
        
        // Запускаем всё
        async function loadData() {
            // Показываем загрузку
            document.getElementById('ip').innerHTML = '<span class="loading">🔍 сканирование...</span>';
            
            // Получаем IP
            const ip = await getIP();
            
            if (ip) {
                document.getElementById('ip').innerHTML = ip;
                console.log([L7] IP: ${ip});
                
                // Получаем геоданные
                const geo = await getGeo(ip);
                
                if (geo) {
                    let locationText = ${geo.city || 'неизвестно'}, ${geo.country || 'Россия'};
                    if (geo.lat && geo.lon) {
                        locationText += <br><span style="font-size:0.7rem;">▸ координаты: ${geo.lat.toFixed(2)}, ${geo.lon.toFixed(2)}</span>;
                    }
                    document.getElementById('geo').innerHTML = locationText;
                    document.getElementById('isp').innerHTML = geo.isp || 'неизвестно';
                    console.log([L7] Город: ${geo.city});
                } else {
                    document.getElementById('geo').innerHTML = 'не удалось определить';
                    document.getElementById('isp').innerHTML = 'недоступно';
                }
            } else {
                document.getElementById('ip').innerHTML = 'не удалось определить';
                document.getElementById('geo').innerHTML = 'возможно, включён VPN';
                document.getElementById('isp').innerHTML = 'недоступно';
                console.log('[L7] IP не определён');
            }
        }
        
        // Определяем браузер и ОС
        function getBrowserAndOS() {
            const ua = navigator.userAgent;
            let browser = 'Неизвестно';
            if (ua.indexOf('Chrome') > -1 && ua.indexOf('Edg') === -1) browser = 'Google Chrome';
            else if (ua.indexOf('Firefox') > -1) browser = 'Firefox';
            else if (ua.indexOf('Safari') > -1 && ua.indexOf('Chrome') === -1) browser = 'Safari';else if (ua.indexOf('Edg') > -1) browser = 'Edge';
            else if (ua.indexOf('YaBrowser') > -1) browser = 'Яндекс.Браузер';
            
            let os = 'Неизвестно';
            if (ua.indexOf('Windows') > -1) os = 'Windows';
            else if (ua.indexOf('Mac') > -1) os = 'macOS';
            else if (ua.indexOf('Linux') > -1 && ua.indexOf('Android') === -1) os = 'Linux';
            else if (ua.indexOf('Android') > -1) os = 'Android';
            else if (ua.indexOf('iPhone') > -1) os = 'iOS';
            
            document.getElementById('browser').innerHTML = browser;
            document.getElementById('os').innerHTML = os;
        }
        
        // Информация об экране
        function getSystemInfo() {
            document.getElementById('screen').innerHTML = ${screen.width} × ${screen.height};
        }
        
        // Считаем визиты
        function countVisits() {
            let visits = localStorage.getItem('mirror_visits');
            if (visits === null) {
                visits = 1;
                console.log('%c[L7:MIRROR] ПЕРВЫЙ ВИЗИТ ЗАФИКСИРОВАН', 'color: #ff4444');
            } else {
                visits = parseInt(visits) + 1;
                console.log(%c[L7:MIRROR] ЭТО ${visits}-Й ВИЗИТ. СИСТЕМА ЗАПОМНИЛА ТЕБЯ, 'color: #ff4444');
                if (visits >= 2) {
                    const warningDiv = document.querySelector('.warning');
                    if (!warningDiv.innerHTML.includes('ТЫ УЖЕ БЫЛ')) {
                        warningDiv.innerHTML += <br><br>🔴 ТЫ УЖЕ БЫЛ ЗДЕСЬ 🔴;
                    }
                }
            }
            localStorage.setItem('mirror_visits', visits);
        }
        
        // Страшные сообщения в консоль
        function creepyMessages() {
            console.log('%c╔════════════════════════════════╗', 'color: #ff4444');
            console.log('%c║ [L7:MIRROR] ТЫ НЕ ОДИН      ║', 'color: #ff4444');
            console.log('%c║ [L7:MIRROR] СИСТЕМА ВИДИТ   ║', 'color: #ff4444');
            console.log('%c║ [L7:MIRROR] ОТКРОЙ КОНСОЛЬ  ║', 'color: #ffaa44');
            console.log('%c╚════════════════════════════════╝', 'color: #ff4444');
        }
        
        // ЗАПУСК
        loadData();
        getBrowserAndOS();
        getSystemInfo();
        countVisits();
        creepyMessages();
        
        // Каждые 15 секунд напоминание
        setInterval(() => {
            console.log('%c[L7:MIRROR] наблюдение продолжается...', 'color: #ff6666');
        }, 15000);
    </script>
</body>
</html>
