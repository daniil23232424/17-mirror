<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L7 MIRROR // НАБЛЮДЕНИЕ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000000;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        @keyframes threat {
            0% { box-shadow: 0 0 10px #ff0000; border-color: #ff0000; }
            100% { box-shadow: 0 0 30px #ff0000; border-color: #ff4444; }
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            padding: 30px;
            border: 2px solid #ff0000;
            background: #0a0000;
            animation: threat 1s infinite alternate;
        }
        
        h1 {
            color: #ff0000;
            text-align: center;
            font-size: 1.3rem;
            margin-bottom: 20px;
        }
        
        .warning {
            background: rgba(255, 0, 0, 0.15);
            border-left: 4px solid #ff0000;
            padding: 15px;
            margin: 20px 0;
            color: #ff8888;
            font-weight: bold;
            text-align: center;
            font-size: 1.2rem;
        }
        
        .blink {
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .data-box {
            background: #000000;
            border: 1px solid #ff3333;
            padding: 20px;
            margin: 20px 0;
        }
        
        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #330000;
        }
        
        .data-label {
            color: #ff6666;
            font-weight: bold;
        }
        
        .data-value {
            color: #ffffff;
            font-family: monospace;
            text-align: right;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: #663333;
        }
        
        .return-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #ff6666;
            text-decoration: none;
            border: 1px solid #ff3333;
            padding: 10px;
        }
        
        .return-link:hover {
            background: #ff0000;
            color: #000;
        }
        
        .loading {
            color: #ffaa44;
        }
        
        .real-data {
            color: #00ff00;
            font-size: 0.7rem;
        }
        
        .simulated {
            color: #ffaa44;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠ L7 MIRROR NODE ⚠</h1>
        
        <div class="warning blink">
            🔴 СИСТЕМА СЛЕДИТ ЗА ТОБОЙ 🔴
        </div>
        
        <div class="data-box">
            <div class="data-row">
                <span class="data-label">[IP АДРЕС]</span>
                <span class="data-value" id="ip"><span class="loading">🔍 сканирование...</span></span>
            </div>
            <div class="data-row">
                <span class="data-label">[ГЕОЛОКАЦИЯ]</span>
                <span class="data-value" id="geo"><span class="loading">🔍 определение...</span></span>
            </div>
            <div class="data-row">
                <span class="data-label">[ПРОВАЙДЕР]</span><span class="data-value" id="isp"><span class="loading">🔍 анализ...</span></span>
            </div>
            <div class="data-row">
                <span class="data-label">[БРАУЗЕР]</span>
                <span class="data-value" id="browser">---</span>
            </div>
            <div class="data-row">
                <span class="data-label">[ОС]</span>
                <span class="data-value" id="os">---</span>
            </div>
            <div class="data-row">
                <span class="data-label">[ЭКРАН]</span>
                <span class="data-value" id="screen">---</span>
            </div>
            <div class="data-row">
                <span class="data-label">[ВРЕМЯ]</span>
                <span class="data-value" id="time">---</span>
            </div>
        </div>
        
        <div class="footer">
            > эта страница показывает, что видит система<br>
            > данные видны только тебе<br>
            > но система запоминает
        </div>
        
        <a href="javascript:history.back()" class="return-link">← ВЕРНУТЬСЯ</a>
    </div>
    
    <script>
        let isRealData = false;
        
        // Российские города для симуляции
        const cities = {
            'Москва': '55.75, 37.62',
            'Санкт-Петербург': '59.93, 30.31',
            'Новосибирск': '55.03, 82.92',
            'Екатеринбург': '56.84, 60.65',
            'Казань': '55.79, 49.12',
            'Нижний Новгород': '56.33, 44.00',
            'Челябинск': '55.15, 61.43',
            'Самара': '53.20, 50.15',
            'Омск': '54.98, 73.37',
            'Ростов-на-Дону': '47.22, 39.72'
        };
        
        const providers = [
            'Ростелеком', 'МТС', 'Билайн', 'Мегафон', 'ТТК', 
            'ER-Telecom', 'Дом.ru', 'ТрансТелеКом', 'NetByNet'
        ];
        
        // Пытаемся получить реальный IP
        async function getRealIP() {
            const apis = [
                'https://api.ipify.org?format=json',
                'https://api.my-ip.io/ip.json',
                'https://ipapi.co/json/'
            ];
            
            for (const api of apis) {
                try {
                    const response = await fetch(api, { timeout: 3000 });
                    const data = await response.json();
                    const ip = data.ip || data;
                    if (ip && typeof ip === 'string' && ip.includes('.')) {
                        return ip;
                    }
                } catch(e) {
                    console.log('API не отвечает:', api);
                }
            }
            return null;
        }
        
        // Получаем геоданные по реальному IP
        async function getRealGeo(ip) {
            try {
                const response = await fetch(https://ip-api.com/json/${ip}?fields=status,country,city,isp,lat,lon);
                const data = await response.json();
                if (data.status === 'success') {
                    return data;
                }
            } catch(e) {}
            return null;
        }
        
        // Симуляция данных
        function getSimulatedData() {
            const cityNames = Object.keys(cities);
            const randomCity = cityNames[Math.floor(Math.random() * cityNames.length)];
            const randomProvider = providers[Math.floor(Math.random() * providers.length)];
            const randomIP = ${Math.floor(Math.random() * 100) + 1}.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)};
            
            return {
                ip: randomIP,
                city: randomCity,
                coords: cities[randomCity],
                provider: randomProvider,
                isReal: false
            };}
        
        // Определяем браузер и ОС (реальные)
        function getBrowserAndOS() {
            const ua = navigator.userAgent;
            let browser = 'Неизвестно';
            if (ua.indexOf('Chrome') > -1 && ua.indexOf('Edg') === -1 && ua.indexOf('YaBrowser') === -1) browser = 'Google Chrome';
            else if (ua.indexOf('YaBrowser') > -1) browser = 'Яндекс.Браузер';
            else if (ua.indexOf('Firefox') > -1) browser = 'Mozilla Firefox';
            else if (ua.indexOf('Safari') > -1 && ua.indexOf('Chrome') === -1) browser = 'Safari';
            else if (ua.indexOf('Edg') > -1) browser = 'Microsoft Edge';
            
            let os = 'Неизвестно';
            if (ua.indexOf('Windows') > -1) os = 'Windows';
            else if (ua.indexOf('Mac') > -1) os = 'macOS';
            else if (ua.indexOf('Linux') > -1 && ua.indexOf('Android') === -1) os = 'Linux';
            else if (ua.indexOf('Android') > -1) os = 'Android';
            else if (ua.indexOf('iPhone') > -1) os = 'iOS';
            
            document.getElementById('browser').innerHTML = browser;
            document.getElementById('os').innerHTML = os;
        }
        
        function getSystemInfo() {
            document.getElementById('screen').innerHTML = ${screen.width} × ${screen.height};
        }
        
        function updateTime() {
            const now = new Date();
            document.getElementById('time').innerHTML = now.toLocaleTimeString('ru-RU');
        }
        
        // Главная функция загрузки
        async function loadData() {
            // Показываем сканирование
            document.getElementById('ip').innerHTML = '<span class="loading">🔍 сканирование...</span>';
            document.getElementById('geo').innerHTML = '<span class="loading">🔍 определение...</span>';
            document.getElementById('isp').innerHTML = '<span class="loading">🔍 анализ...</span>';
            
            // Ждём 1.5 секунды для напряжения
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            // Пытаемся получить реальный IP
            const realIP = await getRealIP();
            
            let data;
            if (realIP) {
                const geo = await getRealGeo(realIP);
                if (geo) {
                    data = {
                        ip: realIP,
                        city: geo.city,
                        coords: ${geo.lat}, ${geo.lon},
                        provider: geo.isp,
                        isReal: true
                    };
                    isRealData = true;
                } else {
                    data = getSimulatedData();
                }
            } else {
                data = getSimulatedData();
            }
            
            // Отображаем данные
            document.getElementById('ip').innerHTML = data.ip;
            
            let geoText = ${data.city}, Россия;
            if (data.coords) {
                geoText += <br><span style="font-size:0.7rem;">▸ координаты: ${data.coords}</span>;
            }
            document.getElementById('geo').innerHTML = geoText;
            document.getElementById('isp').innerHTML = data.provider;
            
            // Добавляем индикатор (только для консоли)
            if (data.isReal) {
                console.log('%c[L7:MIRROR] РЕАЛЬНЫЕ ДАННЫЕ', 'color: #00ff00');
                console.log(%c[L7:MIRROR] IP: ${data.ip}, 'color: #ff6666');
                console.log(%c[L7:MIRROR] Город: ${data.city}, 'color: #ff4444');
            } else {
                console.log('%c[L7:MIRROR] ⚠ ДАННЫЕ СИМУЛИРОВАНЫ ⚠', 'color: #ffaa44');
                console.log('%c[L7:MIRROR] СИСТЕМА НЕ МОГЛА ОПРЕДЕЛИТЬ ТОЧНЫЕ ДАННЫЕ', 'color: #ffaa44');
            }}
        
        // Считаем визиты
        function countVisits() {
            let visits = localStorage.getItem('mirror_visits');
            if (visits === null) {
                visits = 1;
                console.log('%c[L7:MIRROR] ⚠ ПЕРВЫЙ ВИЗИТ ЗАФИКСИРОВАН ⚠', 'color: #ff4444');
            } else {
                visits = parseInt(visits) + 1;
                console.log(%c[L7:MIRROR] ⚠ ЭТО ${visits}-Й ВИЗИТ. СИСТЕМА ЗАПОМНИЛА ТЕБЯ ⚠, 'color: #ff4444');
                
                if (visits >= 2) {
                    const warningDiv = document.querySelector('.warning');
                    if (!warningDiv.innerHTML.includes('ТЫ УЖЕ БЫЛ')) {
                        warningDiv.innerHTML += <br><br>🔴 ТЫ УЖЕ БЫЛ ЗДЕСЬ 🔴<br>СИСТЕМА НЕ ЗАБЫВАЕТ;
                    }
                }
            }
            localStorage.setItem('mirror_visits', visits);
        }
        
        // Страшные сообщения
        function creepyMessages() {
            console.log('%c╔════════════════════════════════════════╗', 'color: #ff4444');
            console.log('%c║ [L7:MIRROR] ТЫ НЕ ОДИН               ║', 'color: #ff4444');
            console.log('%c║ [L7:MIRROR] СИСТЕМА ВИДИТ ТЕБЯ       ║', 'color: #ff4444');
            console.log('%c║ [L7:MIRROR] ОТКРОЙ КОНСОЛЬ (F12)     ║', 'color: #ffaa44');
            console.log('%c╚════════════════════════════════════════╝', 'color: #ff4444');
        }
        
        // Запуск
        async function init() {
            getBrowserAndOS();
            getSystemInfo();
            updateTime();
            setInterval(updateTime, 1000);
            await loadData();
            countVisits();
            creepyMessages();
        }
        
        init();
        
        // Напоминания
        setInterval(() => {
            if (isRealData) {
                console.log('%c[L7:MIRROR] РЕАЛЬНЫЕ ДАННЫЕ ПОДТВЕРЖДЕНЫ', 'color: #00ff00');
            } else {
                console.log('%c[L7:MIRROR] наблюдение продолжается...', 'color: #ff6666');
            }
        }, 20000);
    </script>
</body>
</html>
